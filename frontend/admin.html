<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal | Nanba Digital Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f52b4f;
      --secondary: #ffd600;
      --bg-dark: #0b071e;
      --card-bg: rgba(255, 255, 255, 0.04);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #a0aec0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background decorative glow elements */
    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
      opacity: 0.5;
    }
    .glow-1 {
      width: 400px;
      height: 400px;
      background: var(--primary);
      top: -100px;
      left: -100px;
      animation: float-slow 8s ease-in-out infinite alternate;
    }
    .glow-2 {
      width: 350px;
      height: 350px;
      background: #4a154b;
      bottom: -80px;
      right: -80px;
      animation: float-slow 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Card */
    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
      box-shadow: 0 25px 50px rgba(245, 43, 79, 0.1);
    }

    /* Logo & Header */
    .logo-area {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 30%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 35px;
    }

    /* Form Styles */
    .form-group {
      position: relative;
      margin-bottom: 24px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px 14px 48px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 15px rgba(245, 43, 79, 0.2);
    }

    .form-control:focus + svg {
      color: var(--primary);
    }

    /* Options */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 30px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .remember-me input {
      accent-color: var(--primary);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* Button */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, #c41c3a 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(245, 43, 79, 0.3);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 43, 79, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Back Link */
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 30px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-home:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Background Decorative Blurs -->
  <div class="glow-circle glow-1"></div>
  <div class="glow-circle glow-2"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">NANBA</div>
      <div class="subtitle">Admin Portal Access</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Username/Email Field -->
        <div class="form-group">
          <label for="username">Username or Email</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <!-- Remember & Forgot -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <!-- Back Link -->
      <a href="index.html" class="back-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Website
      </a>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      alert('Mock Login Successful! Redirecting to Website...');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
